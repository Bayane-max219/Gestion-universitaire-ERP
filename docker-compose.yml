services:
  db:
    image: mysql:8.0
    container_name: university-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: gestion_universitaire_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./Base_de_données/gestion_universitaire_db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command: --default-authentication-plugin=mysql_native_password

  app:
    build: .
    container_name: university-app
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: gestion_universitaire_db
      DB_USER: root
      DB_PASSWORD: root
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    ports:
      - "8080:8080"

volumes:
  db_data:
